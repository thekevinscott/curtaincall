name: Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Check for CHANGELOG.md update or skip-changelog trailer
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            if git log -1 --format=%B "$sha" | git interpret-trailers --parse | grep -qiE '^skip-changelog:[[:space:]]*true[[:space:]]*$'; then
              echo "skip-changelog: true trailer found on commit $sha; bypassing check."
              exit 0
            fi
          done
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -qx 'CHANGELOG.md'; then
            echo "CHANGELOG.md was updated."
            exit 0
          fi
          echo "::error::CHANGELOG.md was not updated in this PR."
          echo ""
          echo "Curtaincall is pre-1.0 and does not strictly follow SemVer, so every PR"
          echo "must add an entry under the [Unreleased] heading in CHANGELOG.md."
          echo ""
          echo "If this PR has no consumer impact (pure CI, internal refactor with no"
          echo "behavior change), add a 'Skip-Changelog: true' trailer to any commit"
          echo "in this PR to bypass the check. Example:"
          echo ""
          echo "    chore: rename internal helper"
          echo ""
          echo "    Skip-Changelog: true"
          echo ""
          echo "Breaking changes and meaningful deprecations must also add an entry to"
          echo "MIGRATIONS.md under ## Unreleased."
          exit 1
